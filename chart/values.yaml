# ---------------------------------------------------------------------------
# ln server
# ---------------------------------------------------------------------------
server:
  # -- Container image
  image:
    repository: ghcr.io/igneous-engineering/ln
    tag: latest
    pullPolicy: Always

  # -- Number of replicas
  replicaCount: 1

  # -- Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  # -- Container port
  containerPort: 3000

  # -- Resource limits
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # -- Liveness / readiness probes
  probes:
    liveness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
    readiness:
      path: /
      initialDelaySeconds: 3
      periodSeconds: 5

  # -- Environment variables (non-secret)
  env:
    BASE_URL: "https://ln.example.com"
    PORT: "3000"
    SESSION_TTL_SECONDS: "604800"
    # VALKEY_URL is auto-generated from the release name — override to use an external instance
    # VALKEY_URL: "redis://my-external-valkey:6379"

  # -- OAuth configuration (non-secret overrides)
  # These are passed as env vars. For sensitive values, use existingSecret.
  oauth:
    hd: ""
    authUrl: ""
    tokenUrl: ""
    userinfoUrl: ""
    scope: ""

  # -- Reference to an existing Secret containing sensitive keys.
  # The secret should have these keys:
  #   OAUTH_CLIENT_ID, OAUTH_CLIENT_SECRET, ADMIN_EMAILS
  existingSecret: "ln-secrets"

  # -- Pod annotations
  podAnnotations: {}

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

# ---------------------------------------------------------------------------
# Valkey (bundled datastore)
# ---------------------------------------------------------------------------
valkey:
  image:
    repository: docker.io/valkey/valkey
    tag: 8-alpine
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  persistence:
    enabled: true
    size: 1Gi
    # storageClass: ""   # leave empty for cluster default
