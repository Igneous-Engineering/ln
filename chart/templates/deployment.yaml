apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- with .Values.server.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: false
      serviceAccountName: {{ .Release.Name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.server.containerPort }}
              protocol: TCP
          env:
            - name: VALKEY_URL
              value: "redis://{{ .Release.Name }}-valkey:6379"
            {{- range $key, $val := .Values.server.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.server.oauth.hd }}
            - name: OAUTH_HD
              value: {{ .Values.server.oauth.hd | quote }}
            {{- end }}
            {{- if .Values.server.oauth.authUrl }}
            - name: OAUTH_AUTH_URL
              value: {{ .Values.server.oauth.authUrl | quote }}
            {{- end }}
            {{- if .Values.server.oauth.tokenUrl }}
            - name: OAUTH_TOKEN_URL
              value: {{ .Values.server.oauth.tokenUrl | quote }}
            {{- end }}
            {{- if .Values.server.oauth.userinfoUrl }}
            - name: OAUTH_USERINFO_URL
              value: {{ .Values.server.oauth.userinfoUrl | quote }}
            {{- end }}
            {{- if .Values.server.oauth.scope }}
            - name: OAUTH_SCOPE
              value: {{ .Values.server.oauth.scope | quote }}
            {{- end }}
            {{- if .Values.server.existingSecret }}
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: OAUTH_CLIENT_ID
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: OAUTH_CLIENT_SECRET
            - name: ADMIN_EMAILS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: ADMIN_EMAILS
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.server.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.server.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.server.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.server.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
